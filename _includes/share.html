<div class="share-bar" aria-label="Bagikan artikel">
  <span class="share-label">Bagikan:</span>
  {% assign post_url = page.url | absolute_url %}
  {% assign post_title = page.title | url_encode %}

  <a class="icon-btn share-btn share-facebook" href="https://www.facebook.com/sharer/sharer.php?u={{ post_url }}" target="_blank" rel="noopener" aria-label="Facebook" title="Facebook">
    {% include social-icon.html name="facebook" %}
  </a>
  <a class="icon-btn share-btn share-twitter" href="https://twitter.com/intent/tweet?url={{ post_url }}&text={{ post_title }}" target="_blank" rel="noopener" aria-label="Twitter/X" title="Twitter/X">
    {% include social-icon.html name="twitter" %}
  </a>
  <a class="icon-btn share-btn share-whatsapp" href="https://wa.me/?text={{ post_title }}%20{{ post_url }}" target="_blank" rel="noopener" aria-label="WhatsApp" title="WhatsApp">
    {% include social-icon.html name="whatsapp" %}
  </a>
  <a class="icon-btn share-btn share-telegram" href="https://t.me/share/url?url={{ post_url }}&text={{ post_title }}" target="_blank" rel="noopener" aria-label="Telegram" title="Telegram">
    {% include social-icon.html name="telegram" %}
  </a>
  <button class="icon-btn share-btn" id="copy-link" aria-label="Salin tautan" title="Salin tautan">
    <span class="material-symbols-rounded">content_copy</span>
  </button>
</div>
