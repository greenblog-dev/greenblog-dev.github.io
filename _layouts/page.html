---
layout: default
---
<article class="page md3-surface-1">
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.description %}<p class="page-subtitle">{{ page.description }}</p>{% endif %}
  </header>
  <div class="page-content md3-typography">
    {{ content }}
  </div>
</article>
