---
layout: default
---
<div class="category-header">
  <a href="{{ '/kategori/' | relative_url }}" class="md3-button text">
    <span class="material-symbols-rounded">arrow_back</span> Semua Kategori
  </a>
  <h1 class="category-title">
    <span class="material-symbols-rounded">folder</span>
    {{ page.category_name }}
  </h1>
  <p class="category-count">{{ page.posts_count }} artikel</p>
</div>

<div class="articles-grid">
{% assign posts = site.categories[page.category_slug] %}
{% for post in posts %}
  {% include article-card.html post=post %}
{% endfor %}
</div>
